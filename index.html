<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FKK Pitcher Program｜Winter</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --bg:#0d1117;
  --panel:#111827;
  --line:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#60a5fa;
  font-family:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);line-height:1.7}
.wrap{max-width:1100px;margin:0 auto;padding:16px 14px 80px}
header{border-bottom:1px solid var(--line);padding:16px 14px}
h1{margin:0;color:var(--accent);font-size:1.25rem}
.sub{margin:6px 0 0;color:var(--muted);font-size:.95rem}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:12px;
padding:14px;
}
.card h2{margin:0 0 10px;font-size:1.05rem;color:#c7ddff}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

.badge{
display:inline-block;
border:1px solid var(--line);
color:var(--muted);
border-radius:999px;
padding:4px 8px;
font-size:.8rem;
}

.list{display:grid;gap:10px}
.item{
background:#0b1220;
border:1px solid var(--line);
border-radius:10px;
padding:10px;
}
.item b{color:#fff}
.small{color:var(–muted);font-size:.9rem;margin-top:6px}

.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{
border:1px solid var(--line);
background:transparent;
color:var(--text);
padding:8px 10px;
border-radius:10px;
cursor:pointer;
}
.tab.active{
border-color:rgba(96,165,250,.8);
box-shadow:0 0 0 2px rgba(96,165,250,.15) inset;
}

.footer{text-align:center;color:var(–muted);font-size:.85rem;margin-top:24px}

</style?
</header>

<body>
<header>
  <div class="wrap">
    <h1>FKK 投手｜冬季トレーニング</h1>
    <p class="sub">
      DAY概念なし。新人＝ベースライン固定。4人＝推奨表示つき選択制。
    </p>
  </div>
</header>
<div class="wrap">
<!-- ===== 選手切替 ===== -->
<section class="card">
  <div class="tabs">
    <button class="tab active" data-athlete="base">新人（ベースライン）</button>
    <button class="tab" data-athlete="kuroda">黒田</button>
    <button class="tab" data-athlete="tatsumura">辰村</button>
    <button class="tab" data-athlete="miyake">三宅</button>
    <button class="tab" data-athlete="fujiwara">藤原</button>
  </div>
</section>
<div class="grid2" style="margin-top:12px">
<!-- ===== 左：方針 ===== -->
<section class="card" id="profile">
  <h2>狙い・方針 <span class="badge" id="profileTag">BASELINE</span></h2>
  <div id="profileText" class="small">
    新人は全員このベースメニューを実施。<br>
    呼吸停止・代償・左右差が出たらその場で負荷を下げる。
  </div>
</section>
<!-- ===== 右：注意 ===== -->
<section class="card">
  <h2>共通ルール</h2>
  <div class="small">
    ・呼吸を止めない<br>
    ・骨盤→胸郭→腕の順序を崩さない<br>
    ・痛みが出たら即中断
  </div>
</section>
</div>

<!-- ===== 新人ベースメニュー ===== -->
<section class="card" style="margin-top:12px" id="baseMenu">
  <h2>新人｜ベースメニュー（固定・10種目）</h2>
  <div class="list">
    <div class="item"><b>① 種目名</b><div class="small">狙い／強度（ダミー）</div></div>
    <div class="item"><b>② 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>③ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>④ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑤ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑥ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑦ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑧ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑨ 種目名</b><div class="small">狙い／強度</div></div>
    <div class="item"><b>⑩ 種目名</b><div class="small">狙い／強度</div></div>
  </div>
</section>
<!-- ===== 4人 推奨 ===== -->
<section class="card" style="margin-top:12px" id="recommend">
  <h2>4人｜推奨メニュー（選択制）</h2>
  <div class="list">
    <div class="item">
      <b>推奨①</b>
      <div class="small">◎ この選手は必須（理由ダミー）</div>
    </div>
    <div class="item">
      <b>推奨②</b>
      <div class="small">○ 余裕があれば</div>
    </div>
    <div class="item">
      <b>注意③</b>
      <div class="small">△ 崩れやすい場合は除外</div>
    </div>
  </div>
</section>
<!-- ===== 種目ライブラリ ===== -->
<section class="card" style="margin-top:12px">
  <h2>種目ライブラリ（参照）</h2>
  <div class="small">
    MB／チューブ／シャフト／DB／自重／ジャンプ など<br>
    ※ 後から展開予定
  </div>
</section>
<div class="footer">
  © 2025 adjustment-lab / FKK Pitcher Program
</div>
</div>
  <script>
const profiles={
  base:{tag:"BASELINE",text:"新人は選択なし。全員同一メニューで最低基準を作る。"},
  kuroda:{tag:"KURODA",text:"切替と制御。出力を上げすぎない。"},
  tatsumura:{tag:"TATSUMURA",text:"順序重視。形を追いすぎない。"},
  miyake:{tag:"MIYAKE",text:"再現性。疲労下でも同じ順序。"},
  fujiwara:{tag:"FUJIWARA",text:"制御して解放。力み厳禁。"}
};

document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const id=btn.dataset.athlete;
    document.getElementById("profileTag").textContent=profiles[id].tag;
    document.getElementById("profileText").textContent=profiles[id].text;
  });
});
</script>
</body>
</html>
